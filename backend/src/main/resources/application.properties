spring.application.name=TemplateJava6
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SUNOVA;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456789
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Schema từ backend/sql/SUNOVA_full.sql — chạy init-database.cmd trước khi start backend
spring.jpa.hibernate.ddl-auto=validate
server.port=8080
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

app.upload.dir=uploads
app.upload.products-dir=uploads/products
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB
